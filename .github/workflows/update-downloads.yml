name: Update Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fetch download counts and GitHub stars
        run: uv run --project scripts scripts/fetch_downloads.py

      - name: Fetch citation counts
        run: uv run --project scripts scripts/fetch_citations.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/download_counts.json data/citation_counts.json
          git diff --staged --quiet || git commit -m "chore: update download counts, stars, and citations"
          git push
